<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The New Era 1 | Blox Fruits Client</title>
    <style>
        /* Design für The New Era 1 */
        body { 
            background: #080808; 
            color: #00ffcc; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .main-box {
            border: 3px solid #00ffcc;
            padding: 60px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 25px #00ffcc, inset 0 0 15px #00ffcc;
        }
        h1 { 
            font-size: 55px; 
            margin: 0;
            text-shadow: 0 0 20px #00ffcc;
            letter-spacing: 4px;
        }
        .sub-text { 
            color: #ffffff; 
            font-size: 20px; 
            margin: 25px 0;
            font-weight: bold;
        }
        .download-btn { 
            background: #00ffcc; 
            color: #000; 
            padding: 20px 50px; 
            font-size: 26px; 
            font-weight: 900; 
            border-radius: 5px; 
            text-decoration: none; 
            display: inline-block; 
            transition: 0.5s;
            box-shadow: 0 0 10px #00ffcc;
            border: none;
            cursor: pointer;
        }
        .download-btn:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 0 60px #00ffcc;
            background: #fff;
        }
        .version {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="main-box">
        <h1>THE NEW ERA 1</h1>

        <!-- Hier kommt später dein Link rein -->
