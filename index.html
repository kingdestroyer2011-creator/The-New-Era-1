<!DOCTYPE html>
<html lang="de">
<head>

    <title>The New Era | Blox Fruits Script</title>
    <style>
        /* Das Design der Seite */
        body { 
            background: #050505; 
            color: #00f2ff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            background: #00f2ff; 
            color: #000; 
            padding: 18px 45px; 
            font-size: 22px; 
            font-weight: bold;

            text-decoration: none;
